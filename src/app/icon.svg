<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#1a0f5e"/>

  <!-- Cyan inner border -->
  <rect x="4" y="4" width="92" height="92" rx="19" fill="none" stroke="#00d4e8" stroke-width="3.5"/>

  <!-- Pink accent bar (diagonal slash between E and A) -->
  <line x1="55" y1="16" x2="47" y2="84" stroke="#ff1e8c" stroke-width="4" stroke-linecap="round" opacity="0.9"/>

  <!-- EA letters, skewed -->
  <g transform="translate(50,64) skewX(-8)">
    <text
      text-anchor="middle"
      font-family="'Arial Black', 'Impact', 'Helvetica Neue', sans-serif"
      font-weight="900"
      font-size="60"
      letter-spacing="-3"
    >
      <tspan fill="#ffffff">E</tspan><tspan fill="#00d4e8">A</tspan>
    </text>
  </g>

  <!-- Small butter star accent top-right -->
  <polygon
    points="82,10 83.8,15.5 89.5,15.5 84.9,18.8 86.7,24.3 82,21 77.3,24.3 79.1,18.8 74.5,15.5 80.2,15.5"
    fill="#ffe94a"
    opacity="0.9"
  />
</svg>
