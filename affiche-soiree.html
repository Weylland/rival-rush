<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Affiche — Expression Arena</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Righteous&family=Nunito:wght@700;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --violet: #2D1B8E; --violet-deep: #1A0F5E; --cyan: #00D4E8;
    --pink: #FF1E8C; --butter: #FFE94A; --ink: #1A0F5E; --white: #fff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #3a2aa0; }
  body {
    font-family: "Nunito", system-ui, sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px;
  }
  .page {
    position: relative; overflow: hidden;
    width: 210mm; height: 297mm;
    background: var(--violet);
    background-image: radial-gradient(circle, rgba(0,212,232,0.5) 1.6px, transparent 2px);
    background-size: 22px 22px;
    color: var(--white);
    display: flex; flex-direction: column; align-items: center;
    padding: 26mm 18mm;
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
  }
  .blob { position: absolute; border-radius: 50% 50% 48% 52% / 55% 50% 50% 45%; filter: none; }
  .b1 { width: 280px; height: 250px; top: -90px; left: -80px; background: var(--pink); opacity: 0.55; }
  .b2 { width: 320px; height: 280px; bottom: -110px; right: -90px; background: var(--cyan); opacity: 0.5; border-radius: 50% 50% 52% 48% / 48% 52% 48% 52%; }
  .b3 { width: 180px; height: 170px; top: 38%; right: -70px; background: var(--butter); opacity: 0.18; }
  .star { position: absolute; color: var(--butter); }

  .eyebrow {
    position: relative; z-index: 2;
    font-weight: 900; letter-spacing: 6px; font-size: 18px;
    color: var(--cyan); text-transform: uppercase;
    background: var(--violet-deep); border: 3px solid var(--ink);
    padding: 8px 22px; border-radius: 999px; transform: skewX(-6deg);
    box-shadow: 5px 5px 0 var(--pink);
  }
  .wordmark {
    position: relative; z-index: 2; margin-top: 26px; text-align: center;
    font-family: "Righteous", system-ui, sans-serif; line-height: 0.92;
    transform: skewX(-7deg);
  }
  .wordmark .l1 { font-size: 92px; color: var(--white); text-shadow: 6px 6px 0 var(--pink); display: block; }
  .wordmark .l2 { font-size: 92px; color: var(--butter); text-shadow: 6px 6px 0 var(--ink); display: block; }
  .tagline {
    position: relative; z-index: 2; margin-top: 22px; text-align: center;
    font-size: 24px; font-weight: 900; color: var(--white);
    text-shadow: 2px 2px 0 var(--violet-deep);
  }
  .tagline .em { color: var(--cyan); }

  .qrcard {
    position: relative; z-index: 2; margin-top: auto; margin-bottom: auto;
    background: var(--white); border: 4px solid var(--ink);
    border-radius: 28px; padding: 26px;
    box-shadow: 10px 10px 0 var(--cyan), 10px 10px 0 4px var(--ink);
    display: flex; flex-direction: column; align-items: center; gap: 14px;
  }
  .qrcard svg { width: 340px; height: 340px; display: block; }
  .scan {
    font-family: "Righteous", system-ui, sans-serif; font-size: 30px;
    color: var(--violet-deep); letter-spacing: 1px;
  }
  .url {
    position: relative; z-index: 2; margin-top: 16px;
    font-weight: 900; font-size: 26px; letter-spacing: 1px;
    color: var(--ink); background: var(--butter);
    border: 3px solid var(--ink); border-radius: 999px;
    padding: 10px 26px; transform: skewX(-5deg);
    box-shadow: 5px 5px 0 var(--ink);
  }
  .steps {
    position: relative; z-index: 2; margin-top: 26px;
    display: flex; gap: 14px; flex-wrap: wrap; justify-content: center;
  }
  .step {
    font-weight: 900; font-size: 16px; color: var(--white);
    background: var(--violet-deep); border: 2.5px solid var(--ink);
    border-radius: 14px; padding: 10px 16px;
    box-shadow: 3px 3px 0 var(--pink);
  }
  .step b { color: var(--butter); }

  @page { size: A4 portrait; margin: 0; }
  @media print {
    body { padding: 0; background: #fff; }
    .page { box-shadow: none; }
  }
</style>
</head>
<body>
  <div class="page">
    <!-- Blobs déco -->
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
    <!-- Étoiles -->
    <svg class="star" style="top:7%;left:8%;transform:rotate(12deg)" width="40" height="40" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0 L14 10 L24 12 L14 14 L12 24 L10 14 L0 12 L10 10 Z"/></svg>
    <svg class="star" style="top:16%;right:10%" width="26" height="26" viewBox="0 0 24 24" fill="#fff"><path d="M12 0 L14 10 L24 12 L14 14 L12 24 L10 14 L0 12 L10 10 Z"/></svg>
    <svg class="star" style="bottom:14%;left:7%" width="30" height="30" viewBox="0 0 24 24" fill="#00D4E8"><path d="M12 0 L14 10 L24 12 L14 14 L12 24 L10 14 L0 12 L10 10 Z"/></svg>

    <div class="eyebrow">Soirée jeux · en duel</div>

    <div class="wordmark">
      <span class="l1">EXPRESSION</span>
      <span class="l2">ARENA</span>
    </div>

    <div class="tagline">Affronte tes potes en <span class="em">duel</span>, depuis ton téléphone</div>

    <div class="qrcard">

      <div class="scan">📷 SCANNE POUR JOUER</div>
    </div>

    <div class="url">expression-arena.vercel.app</div>

    <div class="steps">
      <div class="step">1 · <b>Scanne</b> le QR</div>
      <div class="step">2 · <b>Crée</b> ton perso</div>
      <div class="step">3 · <b>Défie</b> qui tu veux</div>
    </div>
  </div>
</body>
</html>
